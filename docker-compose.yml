services:
  postgres:
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    environment:
      POSTGRES_DB: kubeasy
      POSTGRES_USER: kubeasy
      POSTGRES_PASSWORD: kubeasy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubeasy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
    command: redis-server --maxmemory-policy noeviction --requirepass testpassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "testpassword", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  otel-collector:
    build:
      context: ./apps/otel-collector
      args:
        - CONFIG_FILE=config.dev.yaml
    environment:
      - DEPLOYMENT_ENVIRONMENT=development
      - OTLP_ENDPOINT=http://otel-gui:55681
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  otel-gui:
    image: ghcr.io/metafab/otel-gui:latest@sha256:31da568518fddda2a6b9cbcb7c67183f805c8c432f4ab47e27d73c34392ba0ba
    environment:
      - PORT=55681
    ports:
      - "55681:55681"
    depends_on:
      - otel-collector

volumes:
  postgres_data:
  redis_data:
