name: Generate OpenAPI specs

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/src/lib/openapi-apps.ts'
      - 'apps/api/scripts/generate-openapi.ts'
      - 'apps/api/src/schemas/**'
      - 'packages/api-schemas/src/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24.14.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI specs
        run: pnpm openapi:generate

      - name: Commit updated specs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/api/openapi.json apps/api/openapi-sync.json
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "chore(openapi): regenerate specs" && git push)

      - name: Sync CLI spec to CLI repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/kubeasy-dev/kubeasy-cli/dispatches -f event_type=openapi-spec-updated
