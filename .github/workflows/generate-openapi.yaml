name: Generate OpenAPI specs

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/src/lib/openapi-apps.ts'
      - 'apps/api/scripts/generate-openapi.ts'
      - 'apps/api/src/schemas/**'
      - 'packages/api-schemas/src/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.14.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI specs
        run: pnpm openapi:generate

      - name: Commit updated specs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/api/openapi.json
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "chore(openapi): regenerate specs" && git push)
