name: Check OpenAPI spec is up to date

on:
  pull_request:
    paths:
      - 'apps/api/src/routes/**'
      - 'apps/api/src/app.ts'
      - 'apps/api/src/lib/openapi.ts'
      - 'apps/api/src/lib/openapi-shared.ts'
      - 'apps/api/scripts/generate-openapi.ts'
      - 'packages/api-schemas/src/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.14.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate OpenAPI spec
        run: pnpm openapi:generate

      - name: Fail if committed spec is out of date
        run: |
          if ! git diff --exit-code apps/api/openapi.json; then
            echo "::error::apps/api/openapi.json is out of date. Run 'pnpm openapi:generate' locally and commit the result."
            exit 1
          fi
