name: Generate Drizzle Migration

on:
  pull_request:
    paths:
      - 'apps/api/src/db/schema/**'
      - 'packages/api-schemas/src/objectives.ts'

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - id: check
        run: |
          if git log -1 --format='%s' | grep -qF 'chore(db): regenerate drizzle migration'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  generate:
    needs: check-skip
    if: needs.check-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.14.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config --local user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --local user.email "${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Check for existing branch migrations
        id: check-migrations
        run: |
          BASE=${{ github.base_ref }}
          ADDED_SQL=$(git diff origin/$BASE...HEAD --name-only --diff-filter=A -- 'apps/api/drizzle/*.sql')
          if [ -n "$ADDED_SQL" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Existing branch migrations found — skipping generation to preserve manual SQL:"
            echo "$ADDED_SQL"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing branch migrations found, will generate."
          fi

      - name: Generate migration
        if: steps.check-migrations.outputs.exists != 'true'
        working-directory: apps/api
        run: pnpm db:generate

      - name: Commit and push migration
        run: |
          git add apps/api/drizzle/

          if git diff --staged --quiet; then
            echo "No migration changes to commit"
            exit 0
          fi

          git commit -m "chore(db): regenerate drizzle migration"
          git push origin ${{ github.head_ref }}
