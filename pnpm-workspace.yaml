packages:
  - 'packages/*'
  - 'apps/*'

onlyBuiltDependencies:
  - '@resvg/resvg-js'
  - '@tailwindcss/oxide'
  - esbuild
  - sharp
  - unrs-resolver

catalog:
  # Core framework (must be identical for Hono RPC type sharing)
  hono: "4.12.16"

  # Auth
  better-auth: "1.6.9"
  "@better-auth/api-key": "1.6.9"

  # Data / validation
  zod: "4.3.6"
  pg: "8.20.0"
  bullmq: "5.76.5"

  # React
  react: "19.2.5"
  react-dom: "19.2.5"

  # TanStack
  "@tanstack/react-query": "5.100.8"
  "@tanstack/react-router": "1.169.2"

  # Logging
  evlog: "2.15.0"

  # OpenTelemetry (server-side)
  "@opentelemetry/api": "1.9.1"
  "@opentelemetry/core": "2.7.1"
  "@opentelemetry/resources": "2.7.1"
  "@opentelemetry/sdk-node": "0.216.0"
  "@opentelemetry/sdk-logs": "0.216.0"
  "@opentelemetry/sdk-metrics": "2.7.1"
  "@opentelemetry/exporter-trace-otlp-http": "0.216.0"
  "@opentelemetry/exporter-logs-otlp-http": "0.216.0"
  "@opentelemetry/exporter-metrics-otlp-http": "0.216.0"
  "@opentelemetry/instrumentation-http": "0.216.0"
  "@opentelemetry/instrumentation-runtime-node": "0.29.0"

  # UI utilities
  lucide-react: "0.577.0"
  sonner: "2.0.7"
  tailwind-merge: "3.5.0"
  clsx: "2.1.1"
  class-variance-authority: "0.7.1"
  tw-animate-css: "1.4.0"
  "@fontsource-variable/geist": "5.2.8"
